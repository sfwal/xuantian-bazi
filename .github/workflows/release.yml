name: Publish npm packages

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm install --global npm@latest
      - run: npm ci
      - run: npm run check
      - name: Publish packages that are not on npm yet
        shell: bash
        run: |
          publish_if_missing() {
            local package_json="$1"
            local workspace="$2"
            local package_name
            local package_version

            package_name=$(node -p "require('./${package_json}').name")
            package_version=$(node -p "require('./${package_json}').version")

            if npm view "${package_name}@${package_version}" version >/dev/null 2>&1; then
              echo "${package_name}@${package_version} is already published; skipping."
              return
            fi

            npm publish --workspace "${workspace}"
          }

          publish_if_missing packages/core/package.json xuantian-bazi
          publish_if_missing packages/mcp/package.json xuantian-bazi-mcp
